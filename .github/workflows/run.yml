name: Rodar script diário

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar script
        run: python descobrir_carteiras.py --acumular
        env:
          GMGN_API_KEY: ${{ secrets.GMGN_API_KEY }}

      - name: Salvar CSV no repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          git pull
          git add historico_makers.csv
          git commit -m "update csv $(date +'%Y-%m-%d %H:%M:%S')" || echo "nada pra commitar"
          git push
